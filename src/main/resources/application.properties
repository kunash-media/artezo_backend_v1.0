# ==================== COMPRESSION SETTINGS ====================
compression.image.max-size=1MB
compression.image.quality=0.7
compression.image.width=800
compression.image.skip-threshold=500KB

compression.video.max-size=2MB
compression.video.bitrate=300k
compression.video.width=640
compression.video.preset=ultrafast
compression.video.fallback-enabled=true
compression.video.skip-threshold=1MB