version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: artezo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data          # persists data across restarts
    command: redis-server --requirepass artezo@2026
    restart: always

  artezo-backend:
    build: .
    container_name: artezo-app
    ports:
      - "8085:8085"
    environment:
      - SPRING_REDIS_HOST=redis   # container name, not localhost
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=artezo@2026
    depends_on:
      - redis
    restart: always

volumes:
  redis_data: